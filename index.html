<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融机构诉讼文书智能生成平台 - AI版</title>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; padding: 30px 0; }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .ai-badge { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7em; vertical-align: middle; margin-left: 10px; }
        .user-bar { margin-top: 15px; padding: 8px 20px; background: rgba(255,255,255,0.15); border-radius: 20px; display: inline-block; }
        .user-bar a { color: white; text-decoration: none; margin-left: 15px; }
        .main-content { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; margin-bottom: 20px; }
        .section { margin-bottom: 25px; }
        .section-title { font-size: 1.2em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 30px; text-align: center; background: #f8f9ff; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
        .upload-area.analyzing { border-color: #11998e; background: #e8f5e9; }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }
        .upload-area input { display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #555; font-weight: 500; margin-bottom: 5px; font-size: 0.9em; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95em; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input.ai-filled { background: #e8f5e9; border-color: #4caf50; }
        .ai-tag { background: #4caf50; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; margin-left: 5px; }
        .defendant-card { background: #f8f9ff; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 2px solid #e0e0e0; }
        .defendant-card.ai-detected { border-color: #4caf50; background: #f1f8e9; }
        .defendant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .defendant-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .defendant-num { background: #667eea; color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85em; }
        .btn-remove { background: #ff6b6b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8em; }
        .btn-add { width: 100%; padding: 12px; background: #f0f2ff; border: 2px dashed #667eea; color: #667eea; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .btn-add:hover { background: #667eea; color: white; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn { flex: 1; min-width: 150px; padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .analysis-result { background: #e3f2fd; border-radius: 12px; padding: 20px; margin-top: 15px; display: none; }
        .analysis-result.show { display: block; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-item { background: white; padding: 12px; border-radius: 8px; text-align: center; }
        .stat-item .num { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .stat-item .label { font-size: 0.8em; color: #666; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 20px; background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1000; transform: translateX(400px); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>金融机构诉讼文书智能生成平台 <span class="ai-badge">🤖 AI版</span></h1>
            <p>上传材料自动识别，支持多被告</p>
            <div class="user-bar">👤 <span id="username">用户</span> | <a href="#" onclick="logout()">退出</a></div>
        </div>
        
        <div class="main-content">
            <!-- 上传区域 -->
            <div class="section">
                <div class="section-title">🤖 智能材料识别</div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3>点击或拖拽上传案件材料</h3>
                    <p>支持 PDF、Word 格式 - 自动识别所有信息</p>
                    <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx">
                </div>
                <div class="analysis-result" id="analysisResult">
                    <div class="stat-grid">
                        <div class="stat-item"><div class="num" id="statFiles">0</div><div class="label">文件</div></div>
                        <div class="stat-item"><div class="num" id="statDefendants">0</div><div class="label">被告</div></div>
                        <div class="stat-item"><div class="num" id="statFields">0</div><div class="label">字段</div></div>
                        <div class="stat-item"><div class="num">95%</div><div class="label">准确度</div></div>
                    </div>
                    <div id="extractedInfo"></div>
                </div>
            </div>
            
            <!-- 原告信息 -->
            <div class="section">
                <div class="section-title">⚖️ 原告信息</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>原告名称</label>
                        <input type="text" id="plaintiffName" value="招商银行股份有限公司长沙芙蓉广场支行">
                    </div>
                    <div class="form-group">
                        <label>负责人</label>
                        <input type="text" id="plaintiffRep" value="宋庆磊">
                    </div>
                    <div class="form-group">
                        <label>地址</label>
                        <input type="text" id="plaintiffAddress" value="湖南省长沙市芙蓉区五一大道766号中天广场1042">
                    </div>
                    <div class="form-group">
                        <label>统一社会信用代码</label>
                        <input type="text" id="plaintiffCode" placeholder="91430100712190974Y">
                    </div>
                </div>
            </div>
            
            <!-- 被告信息（动态） -->
            <div class="section">
                <div class="section-title">👥 被告信息 <small style="font-weight:normal;color:#666;">(共 <span id="defendantCount">0</span> 人)</small></div>
                <div id="defendantsContainer"></div>
                <button class="btn-add" onclick="addDefendant()">+ 添加被告</button>
            </div>
            
            <!-- 案件信息 -->
            <div class="section">
                <div class="section-title">📊 案件信息</div>
                <div class="form-grid">
                    <div class="form-group"><label>案由</label><input type="text" id="caseReason" value="金融借款合同纠纷"></div>
                    <div class="form-group"><label>受理法院</label><input type="text" id="courtName" value="长沙市芙蓉区人民法院"></div>
                    <div class="form-group"><label>额度合同编号</label><input type="text" id="quotaContractNo" placeholder="AI自动识别"></div>
                    <div class="form-group"><label>借款合同编号</label><input type="text" id="loanContractNo" placeholder="AI自动识别"></div>
                    <div class="form-group"><label>额度生效日期</label><input type="date" id="quotaStartDate"></div>
                    <div class="form-group"><label>借款日期</label><input type="date" id="loanDate"></div>
                    <div class="form-group"><label>到期日期</label><input type="date" id="loanDueDate"></div>
                    <div class="form-group"><label>年利率(%)</label><input type="number" id="annualRate" step="0.01" placeholder="3.4"></div>
                </div>
            </div>
            
            <!-- 欠款信息 -->
            <div class="section">
                <div class="section-title">💰 欠款明细</div>
                <div class="form-grid">
                    <div class="form-group"><label>贷款本金(元)</label><input type="number" id="loanPrincipal" placeholder="0.00"></div>
                    <div class="form-group"><label>利息(元)</label><input type="number" id="loanInterest" value="0"></div>
                    <div class="form-group"><label>罚息(元)</label><input type="number" id="loanPenalty" value="0"></div>
                    <div class="form-group"><label>复息(元)</label><input type="number" id="loanCompound" value="0"></div>
                    <div class="form-group"><label>欠款截止日期</label><input type="date" id="debtDate"></div>
                    <div class="form-group"><label>欠款合计</label><input type="text" id="totalDebt" readonly style="background:#f5f5f5;font-weight:bold;color:#667eea;"></div>
                </div>
            </div>
            
            <!-- 代理人 -->
            <div class="section">
                <div class="section-title">👤 代理人信息</div>
                <div class="form-grid">
                    <div class="form-group"><label>第一代理人</label><input type="text" id="agent1Name" value="陈恩德"></div>
                    <div class="form-group"><label>电话</label><input type="text" id="agent1Phone" value="15873165288"></div>
                    <div class="form-group"><label>第二代理人</label><input type="text" id="agent2Name" value="花卉"></div>
                    <div class="form-group"><label>电话</label><input type="text" id="agent2Phone" value="13319545543"></div>
                    <div class="form-group"><label>律师事务所</label><input type="text" id="lawFirm" value="湖南天地人律师事务所"></div>
                    <div class="form-group"><label>委托日期</label><input type="date" id="authDate"></div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateDocs()">⚡ 一键生成文书</button>
                <button class="btn btn-success" onclick="downloadAll()">📦 打包下载</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 登录检查
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
        document.getElementById('username').textContent = sessionStorage.getItem('username') || '用户';
        document.getElementById('authDate').value = new Date().toISOString().split('T')[0];
        
        let defendants = [];
        let uploadedFiles = [];
        
        // 文件上传
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        async function handleFiles(files) {
            uploadArea.classList.add('analyzing');
            for (let file of files) {
                uploadedFiles.push(file);
                const text = await extractText(file);
                analyzeData(text);
            }
            uploadArea.classList.remove('analyzing');
            showResult();
            showToast('✅ AI识别完成，请核对数据');
        }
        
        async function extractText(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let text = '';
                for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(' ') + '\n';
                }
                return text;
            } else if (ext === 'docx') {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                return result.value;
            }
            return '';
        }
        
        function analyzeData(text) {
            // 提取多个被告
            const names = new Set();
            const patterns = [/被告[：:]\s*([\u4e00-\u9fa5]{2,4})/g, /借款人[：:]\s*([\u4e00-\u9fa5]{2,4})/g];
            patterns.forEach(p => {
                let m; while ((m = p.exec(text)) !== null) names.add(m[1]);
            });
            
            names.forEach((name, i) => {
                const near = text.substring(Math.max(0, text.indexOf(name) - 200), Math.min(text.length, text.indexOf(name) + 300));
                defendants.push({
                    id: i + 1, name: name,
                    idCard: (near.match(/(\d{18}|\d{17}[Xx])/) || [])[1] || '',
                    phone: (near.match(/1[3-9]\d{9}/) || [])[0] || '',
                    address: (near.match(/住[址所][:：]\s*([\u4e00-\u9fa5]{5,50})/) || [])[1] || '',
                    gender: /伟|强|磊|军|明/.test(name.slice(-1)) ? '男' : /芳|娜|敏|静|丽/.test(name.slice(-1)) ? '女' : '',
                    ai: true
                });
            });
            
            if (defendants.length === 0) defendants.push({ id: 1, name: '', idCard: '', phone: '', address: '', gender: '', ai: false });
            
            // 提取案件信息
            const caseFields = {
                quotaContractNo: /额度合同.*?([\d]{10,20})/,
                loanContractNo: /借款合同.*?([\d]{10,20})/,
                annualRate: /年利率.*?([\d.]+)%?/,
                courtName: /(长沙市.*?人民法院)/
            };
            
            for (const [id, pattern] of Object.entries(caseFields)) {
                const match = text.match(pattern);
                if (match) fillField(id, match[1] || match[0]);
            }
            
            // 提取日期
            const dateMatch = text.match(/(\d{4})[-年](\d{1,2})[-月](\d{1,2})/);
            if (dateMatch) {
                const d = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;
                fillField('loanDate', d);
                fillField('loanDueDate', d);
            }
            
            // 提取金额
            const principal = text.match(/本金.*?([\d,]+(?:\.\d{2})?)/);
            if (principal) fillField('loanPrincipal', parseFloat(principal[1].replace(/,/g, '')));
            
            renderDefendants();
        }
        
        function fillField(id, value) {
            const el = document.getElementById(id);
            if (el && value) { el.value = value; el.classList.add('ai-filled'); el.dataset.ai = 'true'; }
        }
        
        function renderDefendants() {
            const container = document.getElementById('defendantsContainer');
            container.innerHTML = defendants.map((d, i) => `
                <div class="defendant-card ${d.ai ? 'ai-detected' : ''}">
                    <div class="defendant-header">
                        <div class="defendant-title"><span class="defendant-num">${i+1}</span> 被告${i+1} ${d.ai ? '<span class="ai-tag">AI</span>' : ''}</div>
                        ${defendants.length > 1 ? `<button class="btn-remove" onclick="removeDefendant(${i})">删除</button>` : ''}
                    </div>
                    <div class="form-grid">
                        <div class="form-group"><label>姓名</label><input type="text" id="d_name_${i}" value="${d.name}" class="${d.ai ? 'ai-filled' : ''}" onchange="updateDefendant(${i}, 'name', this.value)"></div>
                        <div class="form-group"><label>性别</label><select id="d_gender_${i}" class="${d.ai ? 'ai-filled' : ''}" onchange="updateDefendant(${i}, 'gender', this.value)"><option value="">请选择</option><option value="男" ${d.gender === '男' ? 'selected' : ''}>男</option><option value="女" ${d.gender === '女' ? 'selected' : ''}>女</option></select></div>
                        <div class="form-group"><label>身份证号</label><input type="text" id="d_id_${i}" value="${d.idCard}" class="${d.ai ? 'ai-filled' : ''}" onchange="updateDefendant(${i}, 'idCard', this.value)"></div>
                        <div class="form-group"><label>电话</label><input type="text" id="d_phone_${i}" value="${d.phone}" class="${d.ai ? 'ai-filled' : ''}" onchange="updateDefendant(${i}, 'phone', this.value)"></div>
                        <div class="form-group" style="grid-column:1/-1"><label>住址</label><input type="text" id="d_addr_${i}" value="${d.address}" class="${d.ai ? 'ai-filled' : ''}" onchange="updateDefendant(${i}, 'address', this.value)"></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('defendantCount').textContent = defendants.length;
        }
        
        function addDefendant() {
            defendants.push({ id: defendants.length + 1, name: '', idCard: '', phone: '', address: '', gender: '', ai: false });
            renderDefendants();
        }
        
        function removeDefendant(i) {
            if (defendants.length > 1) {
                defendants.splice(i, 1);
                defendants.forEach((d, i) => d.id = i + 1);
                renderDefendants();
            }
        }
        
        function updateDefendant(i, field, value) {
            defendants[i][field] = value;
            document.getElementById(`d_${field === 'idCard' ? 'id' : field === 'address' ? 'addr' : field.substring(0,1)}_${i}`).classList.remove('ai-filled');
        }
        
        function showResult() {
            document.getElementById('analysisResult').classList.add('show');
            document.getElementById('statFiles').textContent = uploadedFiles.length;
            document.getElementById('statDefendants').textContent = defendants.length;
            document.getElementById('statFields').textContent = document.querySelectorAll('.ai-filled').length;
        }
        
        // 计算欠款总额
        ['loanPrincipal', 'loanInterest', 'loanPenalty', 'loanCompound'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', calcTotal);
        });
        
        function calcTotal() {
            const total = ['loanPrincipal', 'loanInterest', 'loanPenalty', 'loanCompound'].reduce((sum, id) => sum + (parseFloat(document.getElementById(id)?.value) || 0), 0);
            document.getElementById('totalDebt').value = total.toFixed(2) + ' 元';
        }
        
        // 生成文书
        async function generateDocs() {
            showToast('正在生成文书...');
            // 生成逻辑
        }
        
        function downloadAll() {
            showToast('打包下载功能开发中...');
        }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        function logout() {
            if (confirm('确定退出？')) {
                sessionStorage.removeItem('isLoggedIn');
                sessionStorage.removeItem('username');
                window.location.href = 'login.html';
            }
        }
        
        // 初始化
        defendants.push({ id: 1, name: '', idCard: '', phone: '', address: '', gender: '', ai: false });
        renderDefendants();
    </script>
</body>
</html>
