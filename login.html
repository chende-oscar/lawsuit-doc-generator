<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body { font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; background:linear-gradient(135deg,#667eea,#764ba2); }
        .box { background:white; padding:40px; border-radius:10px; text-align:center; }
        input { display:block; margin:10px 0; padding:10px; width:200px; }
        button { padding:10px 20px; background:#667eea; color:white; border:none; border-radius:5px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>登录</h2>
        <input type="text" id="u" placeholder="用户名: admin">
        <input type="password" id="p" placeholder="密码: 123456">
        <button onclick="login()">登录</button>
    </div>
    <script>
        function login() {
            if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='123456'){
                sessionStorage.setItem('isLoggedIn','true');
                window.location.href='index.html';
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
